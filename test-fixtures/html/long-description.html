<!DOCTYPE html>
<html>
<head>
  <title>Very Long Description</title>
  <meta name="description" content="This is an extremely long description that exceeds the normal length limits. It contains many sentences with lots of detail about the content of the page. This description goes on and on with more information than anyone would reasonably want in a meta description. It includes redundant information, repetitive phrases, and unnecessary verbosity. The point is to test that the sanitization function properly truncates descriptions that are too long. We want to ensure that property values don't become unwieldy and break org-mode's property drawer formatting. This description should definitely be longer than 500 characters to trigger the truncation logic in the sanitization function. Let's add even more text to be absolutely sure we exceed that limit. More words, more sentences, more content to test the truncation behavior thoroughly and completely.">
</head>
<body>
  <article>
    <h1>Testing Long Descriptions</h1>
    <p>This page tests handling of very long meta descriptions.</p>
    <p>The description should be truncated to a reasonable length.</p>
  </article>
</body>
</html>
